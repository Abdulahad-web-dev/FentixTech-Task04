<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram Explore UI</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
  
  <div class="phone">
    <div class="notch"></div>
    <div class="status-bar">
      <span>9:41</span>
      <div style="display: flex; gap: 5px;">
        <i class="ph-fill ph-cell-signal-full"></i>
        <i class="ph-fill ph-wifi-high"></i>
        <i class="ph-fill ph-battery-full"></i>
      </div>
    </div>

    <!-- Scrollable Content -->
    <div class="content">
      
      <!-- Search Bar -->
      <div class="search-bar-container">
        <div class="search-bar">
          <i class="ph ph-magnifying-glass" style="font-size: 18px;"></i>
          <span>Search</span>
        </div>
      </div>

      <!-- Explore Tags -->
      <div class="explore-tags">
        <div class="explore-tag"><i class="ph-fill ph-monitor-play" style="margin-right: 5px;"></i>IGTV</div>
        <div class="explore-tag"><i class="ph-fill ph-storefront" style="margin-right: 5px;"></i>Shop</div>
        <div class="explore-tag">Design</div>
        <div class="explore-tag">Decor</div>
        <div class="explore-tag">Architecture</div>
        <div class="explore-tag">Travel</div>
      </div>

      <!-- Explore Grid -->
      <div class="explore-grid">
        <div class="explore-grid-item"></div>
        <div class="explore-grid-item"></div>
        <div class="explore-grid-item large"></div>
        <div class="explore-grid-item"></div>
        <div class="explore-grid-item"></div>
        <div class="explore-grid-item"></div>
        <div class="explore-grid-item"></div>
        <div class="explore-grid-item"></div>
        <div class="explore-grid-item large"></div>
        <div class="explore-grid-item"></div>
        <div class="explore-grid-item"></div>
        <div class="explore-grid-item"></div>
      </div>
      
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
      <a href="feed.html"><i class="ph ph-house"></i></a>
      <a href="explore.html" style="color: black;"><i class="ph-fill ph-magnifying-glass"></i></a>
      <a href="#"><i class="ph ph-plus-square"></i></a>
      <a href="#"><i class="ph ph-film-strip"></i></a>
      <a href="profile.html"><img src="1.jpeg" class="nav-profile" style="object-fit: cover;" alt=""></a>
    </div>
  </div>

</body>
</html>
