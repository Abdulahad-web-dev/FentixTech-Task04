<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram Profile UI</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Phosphor Icons for modern thin icons similar to Instagram -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
  
  <div class="phone">
    <!-- Notch and Status Bar -->
    <div class="notch"></div>
    <div class="status-bar">
      <span>9:41</span>
      <div style="display: flex; gap: 5px;">
        <i class="ph-fill ph-cell-signal-full"></i>
        <i class="ph-fill ph-wifi-high"></i>
        <i class="ph-fill ph-battery-full"></i>
      </div>
    </div>

    <!-- Top Navigation -->
    <div class="top-nav">
      <div class="title">
        <i class="ph ph-lock-key"></i>
        abdulahadwarr
        <i class="ph ph-caret-down" style="font-size: 14px;"></i>
      </div>
      <div class="icons">
        <i class="ph ph-plus-square"></i>
        <i class="ph ph-list"></i>
      </div>
    </div>

    <!-- Scrollable Content -->
    <div class="content">
      
      <!-- Profile Header -->
      <div class="profile-header">
        <div class="profile-avatar">
          <img src="1.jpeg" class="inner" style="object-fit: cover;" alt="">
          <div class="add-icon"><i class="ph ph-plus"></i></div>
        </div>
        <div class="profile-stats">
          <div class="stat-item">
            <span class="stat-value">48</span>
            <span class="stat-label">posts</span>
          </div>
          <div class="stat-item">
            <span class="stat-value">115</span>
            <span class="stat-label">followers</span>
          </div>
          <div class="stat-item">
            <span class="stat-value">265</span>
            <span class="stat-label">following</span>
          </div>
        </div>
      </div>

      <!-- Profile Info -->
      <div class="profile-info">
        <h1>Abdulahad Warraich</h1>
        <p>Digital Creator</p>
        <p>Explore the world with me ✨</p>
      </div>

      <!-- Profile Actions -->
      <div class="profile-actions">
        <button class="btn">Edit profile</button>
        <button class="btn">Share profile</button>
        <button class="btn btn-icon"><i class="ph ph-user-plus"></i></button>
      </div>

      <!-- Highlights -->
      <div class="highlights">
        <div class="highlight-item">
          <div class="highlight-ring">
            <div class="highlight-inner add"><i class="ph ph-plus"></i></div>
          </div>
          <span>New</span>
        </div>
        <div class="highlight-item">
          <div class="highlight-ring active">
            <div class="highlight-inner"></div>
          </div>
          <span>Highlights</span>
        </div>
        <div class="highlight-item">
          <div class="highlight-ring active">
            <div class="highlight-inner"></div>
          </div>
          <span>Travel</span>
        </div>
        <div class="highlight-item">
          <div class="highlight-ring active">
            <div class="highlight-inner"></div>
          </div>
          <span>Food</span>
        </div>
      </div>

      <!-- Tabs -->
      <div class="profile-tabs">
        <div class="tab active"><i class="ph ph-squares-four"></i></div>
        <div class="tab"><i class="ph ph-user-square"></i></div>
      </div>

      <!-- Post Grid -->
      <div class="grid">
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
      </div>
      
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
      <a href="index.html"><i class="ph ph-house"></i></a>
      <a href="explore.html"><i class="ph ph-magnifying-glass"></i></a>
      <a href="#"><i class="ph ph-plus-square"></i></a>
      <a href="#"><i class="ph ph-film-strip"></i></a>
      <a href="profile.html"><img src="1.jpeg" class="nav-profile" style="object-fit: cover;" alt=""></a>
    </div>
  </div>

</body>
</html>
